<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>西尼优家居香薰 · 产品文档</title>
<script src="data.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap');

:root {
  --bg: #faf8f5; --surface: #ffffff; --surface2: #f4f1ec; --border: #e8e2d9;
  --text: #1a1a18; --text2: #5c574f; --text3: #9c968c;
  --accent: #8b6f47; --accent2: #c4956a; --accent-light: #f5ede2;
  --sidebar-w: 240px; --header-h: 60px;
  --green: #4a7c59; --green-light: #e8f2ec; --blue: #3d6b8c; --blue-light: #e8eff5;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.8; min-height: 100vh; overflow-x: hidden; }

/* ─── 头部导航 ─── */
.header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 16px; z-index: 100; box-shadow: 0 1px 8px rgba(0,0,0,.04); }

.menu-btn { display: none; background: none; border: none; font-size: 24px; color: var(--text); cursor: pointer; padding: 4px; border-radius: 4px; }
.menu-btn:hover { background: var(--surface2); }

.brand { font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 17px; color: var(--accent); white-space: nowrap; letter-spacing: .03em; }
.brand span { color: var(--text3); font-weight: 400; font-size: 13px; margin-left: 6px; }

/* 搜索框 */
.search-wrap { flex: 1; max-width: 600px; position: relative; margin-left: auto; }
.search-wrap input { width: 100%; padding: 8px 36px 8px 16px; border: 1.5px solid var(--border); border-radius: 20px; background: var(--surface2); font-family: inherit; font-size: 13px; color: var(--text); outline: none; transition: border-color .2s, background .2s; }
.search-wrap input:focus { border-color: var(--accent2); background: #fff; }
.search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
.search-results { display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.1); max-height: 60vh; overflow-y: auto; z-index: 200; }
.search-results.show { display: block; }
.search-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background .15s; }
.search-item:hover { background: var(--accent-light); }
.search-item-title { font-weight: 500; font-size: 13px; color: var(--text); }
.search-item-desc { font-size: 12px; color: var(--text3); margin-top: 2px; }
.search-item-tag { font-size: 11px; color: var(--accent); background: var(--accent-light); padding: 1px 6px; border-radius: 4px; float: right; }

/* ─── 布局主体 ─── */
.layout { display: flex; margin-top: var(--header-h); min-height: calc(100vh - var(--header-h)); width: 100%; }

/* 侧边栏遮罩（移动端用） */
.sidebar-overlay { display: none; position: fixed; top: var(--header-h); left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 80; backdrop-filter: blur(2px); }

/* 左侧菜单 */
.sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); position: fixed; top: var(--header-h); bottom: 0; left: 0; overflow-y: auto; padding: 16px 0; z-index: 90; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

/* 菜单项样式 */
.sidebar-section { margin-bottom: 4px; }
.sidebar-tab { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text2); border-left: 3px solid transparent; transition: all .18s; user-select: none; }
.sidebar-tab:hover { background: var(--surface2); color: var(--text); }
.sidebar-tab.active { background: var(--accent-light); color: var(--accent); border-left-color: var(--accent); }
.sidebar-tab .icon { font-size: 16px; flex-shrink: 0; }
.sidebar-tab .arrow { margin-left: auto; font-size: 11px; transition: transform .2s; color: var(--text3); }
.sidebar-tab.open .arrow { transform: rotate(90deg); }
.sidebar-sub { display: none; background: var(--surface2); border-bottom: 1px solid var(--border); }
.sidebar-sub.open { display: block; }
.sidebar-sub-item { padding: 8px 16px 8px 44px; font-size: 13px; color: var(--text2); cursor: pointer; transition: all .15s; border-left: 3px solid transparent; display: flex; align-items: center; gap: 6px; }
.sidebar-sub-item:hover { background: var(--accent-light); color: var(--accent); }
.sidebar-sub-item.active { color: var(--accent); border-left-color: var(--accent2); font-weight: 500; }

/* ─── 内容区域 ─── */
.main { margin-left: var(--sidebar-w); flex: 1; padding: 24px 32px; width: calc(100% - var(--sidebar-w)); transition: margin-left 0.3s, width 0.3s; }

.panel { display: none; }
.panel.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

.panel-title { font-family: 'Noto Serif SC', serif; font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.panel-sub { font-size: 13px; color: var(--text3); margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.content-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; width: 100%; box-shadow: 0 1px 4px rgba(0,0,0,.02); }
.content-card h3 { font-family: 'Noto Serif SC', serif; font-size: 16px; font-weight: 600; color: var(--accent); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

/* 图片排版 */
.content-img { max-width: 100%; height: auto; border-radius: 8px; margin: 12px 0; border: 1px solid var(--border); display: block; }
.img-row { display: flex; gap: 12px; margin: 12px 0; }
.img-row img { margin: 0; flex: 1; width: 100%; min-width: 0; object-fit: contain; }

/* 表格与网格 */
.info-grid { display: grid; grid-template-columns: 140px 1fr; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
.info-grid-row { display: contents; }
.info-grid-row > div { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.6; }
.info-grid-row:last-child > div { border-bottom: none; }
.info-grid-row > div:first-child { background: var(--surface2); font-weight: 500; color: var(--text2); border-right: 1px solid var(--border); }
.info-grid-row > div:last-child { background: var(--surface); }

/* 产品卡片 (去掉图标后优化样式) */
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.product-card { padding: 24px 16px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; transition: all .15s; text-align: center; }
.product-card:hover { border-color: var(--accent2); background: var(--accent-light); transform: translateY(-2px); }
.product-card .p-name { font-size: 15px; font-weight: 600; color: var(--text); }
.product-card .p-price { font-size: 13px; color: var(--accent2); margin-top: 6px; }

/* 问答列表 */
.qa-item { margin-bottom: 16px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.qa-q { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 8px; display: flex; gap: 8px; align-items: flex-start; }
.qa-q::before { content: 'Q'; background: var(--accent); color: #fff; border-radius: 4px; font-size: 12px; font-weight: 700; padding: 2px 6px; flex-shrink: 0; margin-top: 1px; }
.qa-a { color: var(--text2); padding-left: 26px; font-size: 13px; }
.qa-a::before { content: 'A：'; font-weight: 500; color: var(--green); }

/* 标签与提示 */
.badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 500; margin-bottom: 12px;}
.badge-green { background: var(--green-light); color: var(--green); }
.badge-blue { background: var(--blue-light); color: var(--blue); }
.notice { background: var(--blue-light); border-left: 3px solid var(--blue); border-radius: 0 6px 6px 0; padding: 12px 16px; font-size: 13px; color: var(--blue); margin: 12px 0; }
.warn { background: #fff3e0; border-left: 3px solid #e65100; border-radius: 0 6px 6px 0; padding: 12px 16px; font-size: 13px; color: #bf360c; margin: 12px 0; }
.empty-panel { text-align: center; padding: 80px 20px; color: var(--text3); }
.empty-panel .big { font-size: 48px; margin-bottom: 12px; }

/* 详情页 Tabs */
.product-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; background: var(--surface2); border-radius: 8px; padding: 6px; width: fit-content; }
.product-tab-btn { padding: 8px 20px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text2); transition: all .15s; border: none; background: transparent; font-family: inherit; }
.product-tab-btn.active { background: var(--surface); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.product-section { display: none; }
.product-section.active { display: block; }
ul, ol { padding-left: 20px; line-height: 2; }

/* =========================================
   响应式设计：手机与平板适配 (< 768px)
   ========================================= */
@media (max-width: 768px) {
  .menu-btn { display: block; }
  .brand span { display: none; }
  .search-wrap { max-width: 200px; }

  .sidebar { transform: translateX(-100%); width: 260px; box-shadow: 2px 0 12px rgba(0,0,0,0.1); }
  .sidebar.show { transform: translateX(0); }
  .sidebar-overlay.show { display: block; }

  .main { margin-left: 0; width: 100%; padding: 16px 12px; }
  .content-card { padding: 16px; border-radius: 8px; }
  .info-grid { grid-template-columns: 90px 1fr; }
  .info-grid-row > div { padding: 8px 10px; font-size: 12px; }
  
  .img-row { flex-direction: column; gap: 8px; }
  .img-row img { width: 100%; }

  .qa-item { padding: 12px; }
  .qa-a { padding-left: 0; margin-top: 6px; }

  .product-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .product-card { padding: 20px 12px; }
}
</style>
</head>
<body>

<header class="header">
  <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
  </button>
  
  <div class="brand">西尼优家居 <span>产品文档</span></div>
  
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="搜索产品、问题…" autocomplete="off">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <div class="search-results" id="searchResults"></div>
  </div>
</header>

<div class="layout">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-tab" onclick="switchPanel('all', this)">
        <span class="icon">📋</span><span class="label">全部分类</span>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-tab" id="tab-products" onclick="toggleSub('sub-products', this)">
        <span class="icon">🛍️</span><span class="label">产品类型</span><span class="arrow">›</span>
      </div>
      <div class="sidebar-sub open" id="sub-products">
        <div style="padding: 15px; font-size: 12px; color: #999;">载入中...</div>
      </div> 
    </div>
    <div class="sidebar-section">
      <div class="sidebar-tab open" id="tab-issues" onclick="toggleSub('sub-issues', this)">
        <span class="icon">💬</span><span class="label">问题场景</span><span class="arrow">›</span>
      </div>
      <div class="sidebar-sub open" id="sub-issues">
        <div class="sidebar-sub-item" onclick="switchPanel('issue-presale', this)">产品使用（售前）</div>
        <div class="sidebar-sub-item" onclick="switchPanel('issue-aftersale', this)">售后服务</div>
        <div class="sidebar-sub-item" onclick="switchPanel('issue-buy', this)">购买帮助</div>
        <div class="sidebar-sub-item" onclick="switchPanel('issue-vip', this)">增值服务</div>
      </div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="panel active" id="panel-all">
      <div class="panel-title">全部分类</div>
      <div class="panel-sub">西尼优家居香薰文档 · 快速导航</div>
      <div class="content-card">
        <h3>🛍️ 产品类型</h3>
        <div class="product-grid" id="all-products-grid" style="margin-bottom:0"></div>
      </div>
    </div>

    <div class="panel" id="panel-product">
      <div id="product-detail-container"></div>
    </div>

    <div class="panel" id="panel-issue-presale">
      <div class="panel-title">产品使用（售前）</div>
      <div class="panel-sub">各产品常见售前问题汇总</div>
      <div id="global-presale-container"></div>
    </div>

    <div class="panel" id="panel-issue-aftersale">
      <div class="panel-title">售后服务</div>
      <div class="panel-sub">各产品常见售后问题与解决方案</div>
      <div id="global-aftersale-container"></div>
    </div>

    <div class="panel" id="panel-issue-buy">
      <div class="panel-title">购买帮助</div>
      <div class="panel-sub">下单流程、送礼订单、发票申请等购买指引</div>
      <div id="global-buy-container"></div>
    </div>

    <div class="panel" id="panel-issue-vip">
      <div class="panel-title">增值服务</div>
      <div class="panel-sub">赠品活动、晒图奖励、复购优惠等增值权益</div>
      <div class="empty-panel"><div class="big">⭐</div><p>增值服务内容即将更新，敬请期待</p></div>
    </div>
  </main>
</div>

<script>
let SEARCH_INDEX = [];

document.addEventListener('DOMContentLoaded', () => {
  if (typeof DATABASE !== 'undefined') {
    initApp();
  } else {
    document.getElementById('all-products-grid').innerHTML = `
      <div style="grid-column: 1 / -1; color: red; font-weight: bold; background: #fff0f0; padding: 20px; border-radius: 8px;">
        数据加载失败。<br>请确保在同目录下创建了名为 "data.js" 的文件，并且里面包含正确的 const DATABASE 数据。
      </div>
    `;
  }
});

function initApp() {
  renderSidebar();
  renderAllProductsGrid();
  renderGlobalScenario('presale', 'global-presale-container');
  renderGlobalScenario('aftersale', 'global-aftersale-container');
  renderGlobalBuyPanel();
  buildSearchIndex();
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('show');
  overlay.classList.toggle('show');
}

function closeSidebarOnMobile() {
  if(window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('show');
    document.getElementById('sidebarOverlay').classList.remove('show');
  }
}

function renderSidebar() {
  document.getElementById('sub-products').innerHTML = DATABASE.products.map(p => 
    `<div class="sidebar-sub-item" data-pid="${p.id}" onclick="selectProduct('${p.id}')">
      ${p.name}
     </div>`
  ).join('');
}

function renderAllProductsGrid() {
  document.getElementById('all-products-grid').innerHTML = DATABASE.products.map(p => 
    `<div class="product-card" onclick="selectProduct('${p.id}')">
      <div class="p-name">${p.name}</div>
      <div class="p-price">${p.price}</div>
    </div>`
  ).join('');
}

function selectProduct(id) {
  document.querySelectorAll('.sidebar-sub-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.sidebar-tab').forEach(el => el.classList.remove('active'));
  
  const activeItem = document.querySelector(`.sidebar-sub-item[data-pid="${id}"]`);
  if(activeItem) activeItem.classList.add('active');
  document.getElementById('tab-products').classList.add('active');

  const p = DATABASE.products.find(x => x.id === id);
  if(!p) return;

  const infoHTML = p.info ? p.info.map(row => `<div class="info-grid-row"><div>${row[0]}</div><div>${row[1]}</div></div>`).join('') : '';
  const introHTML = p.introBlocks ? p.introBlocks.map(block => `<div class="content-card"><h3>${block.title}</h3>${block.html}</div>`).join('') : '';
  const generateQA = (arr) => (!arr || arr.length === 0) ? '<div class="empty-panel"><div class="big">📋</div><p>暂无记录</p></div>' : arr.map(qa => `<div class="qa-item"><div class="qa-q">${qa.q}</div><div class="qa-a">${qa.a}</div></div>`).join('');

  document.getElementById('product-detail-container').innerHTML = `
    <div style="margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:16px;">
      <div class="panel-title" style="margin-bottom:0">${p.name}</div>
      <div style="font-size:13px;color:var(--text3);margin-top:6px;">${p.price}</div>
    </div>
    <div class="product-tabs">
      <button class="product-tab-btn active" onclick="switchProductTab('intro', this)">产品介绍</button>
      <button class="product-tab-btn" onclick="switchProductTab('presale', this)">售前问题</button>
      <button class="product-tab-btn" onclick="switchProductTab('aftersale', this)">售后服务</button>
    </div>
    <div class="product-section active" id="prod-intro">
      <div class="content-card"><h3>基本参数</h3><div class="info-grid">${infoHTML}</div></div>
      ${introHTML}
    </div>
    <div class="product-section" id="prod-presale">
      <div class="badge badge-blue">💡 售前 FAQ</div>
      ${generateQA(p.presaleQA)}
    </div>
    <div class="product-section" id="prod-aftersale">
      <div class="badge badge-green">🔄 售后 FAQ</div>
      ${generateQA(p.aftersaleQA)}
    </div>
  `;
  switchPanel('product');
}

function renderGlobalScenario(type, containerId) {
  const container = document.getElementById(containerId);
  const dataKey = type === 'presale' ? 'presaleQA' : 'aftersaleQA';
  let html = '';
  DATABASE.products.forEach(p => {
    if(p[dataKey] && p[dataKey].length > 0) {
      html += `
        <div class="content-card">
          <h3 style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;" onclick="selectProduct('${p.id}')">
            <span>${p.name}</span>
            <span style="font-size:12px;color:var(--text3);font-weight:400;">查看详情 &rarr;</span>
          </h3>
          ${p[dataKey].map(qa => `<div class="qa-item"><div class="qa-q">${qa.q}</div><div class="qa-a">${qa.a}</div></div>`).join('')}
        </div>
      `;
    }
  });
  container.innerHTML = html || '<div class="empty-panel"><p>暂无数据</p></div>';
}

function renderGlobalBuyPanel() {
  document.getElementById('global-buy-container').innerHTML = DATABASE.globalBuyInfo.map(info => `
    <div class="content-card">
      <h3>${info.title}</h3>
      ${info.html || ''}
      ${info.qa ? info.qa.map(qa => `<div class="qa-item"><div class="qa-q">${qa.q}</div><div class="qa-a">${qa.a}</div></div>`).join('') : ''}
    </div>
  `).join('');
}

function switchPanel(panelId, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const target = document.getElementById('panel-' + panelId);
  if(target) target.classList.add('active');

  if(el && el.classList.contains('sidebar-sub-item')) {
    document.querySelectorAll('.sidebar-sub-item').forEach(e => e.classList.remove('active'));
    document.querySelectorAll('.sidebar-tab').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    el.closest('.sidebar-section').querySelector('.sidebar-tab').classList.add('active');
  } else if (el && el.classList.contains('sidebar-tab')) {
    document.querySelectorAll('.sidebar-sub-item').forEach(e => e.classList.remove('active'));
    document.querySelectorAll('.sidebar-tab').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
  }

  closeSidebarOnMobile();
  window.scrollTo(0, 0); 
}

function switchProductTab(tabId, btn) {
  document.querySelectorAll('.product-tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.product-section').forEach(s => s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('prod-' + tabId).classList.add('active');
}

function toggleSub(subId, tabEl) {
  const sub = document.getElementById(subId);
  const isOpen = sub.classList.contains('open');
  sub.classList.toggle('open', !isOpen);
  tabEl.classList.toggle('open', !isOpen);
}

function buildSearchIndex() {
  DATABASE.products.forEach(p => {
    SEARCH_INDEX.push({ title: p.name, desc: '产品详情', tag: '产品', action: () => selectProduct(p.id) });
    if(p.presaleQA) p.presaleQA.forEach(qa => {
      SEARCH_INDEX.push({ title: qa.q, desc: p.name, tag: '售前', action: () => { selectProduct(p.id); setTimeout(()=> document.querySelectorAll('.product-tab-btn')[1].click(), 50); } });
    });
    if(p.aftersaleQA) p.aftersaleQA.forEach(qa => {
      SEARCH_INDEX.push({ title: qa.q, desc: p.name, tag: '售后', action: () => { selectProduct(p.id); setTimeout(()=> document.querySelectorAll('.product-tab-btn')[2].click(), 50); } });
    });
  });
}

const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
searchInput.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { searchResults.classList.remove('show'); return; }
  const matched = SEARCH_INDEX.filter(item => item.title.toLowerCase().includes(q) || item.desc.toLowerCase().includes(q)).slice(0, 8);
  if (!matched.length) { searchResults.classList.remove('show'); return; }
  searchResults.innerHTML = matched.map((item, idx) => `
    <div class="search-item" onclick="SEARCH_INDEX[${SEARCH_INDEX.indexOf(item)}].action(); document.getElementById('searchResults').classList.remove('show'); document.getElementById('searchInput').value='';">
      <span class="search-item-tag">${item.tag}</span>
      <div class="search-item-title">${item.title}</div><div class="search-item-desc">${item.desc}</div>
    </div>
  `).join('');
  searchResults.classList.add('show');
});
document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) searchResults.classList.remove('show'); });
</script>
</body>
</html>
